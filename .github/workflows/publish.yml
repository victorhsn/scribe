name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-restore

      - name: Pack
        run: dotnet pack src/Scribe.Notifications.Core/Scribe.Notifications.Core.csproj -c Release --no-restore --output ./artifacts

      - name: Push to NuGet (Trusted Publishing)
        run: |
          TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" | jq -r '.value')

          NUGET_KEY=$(curl -sS -X POST "https://www.nuget.org/api/v1/apikeys/oidc" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"$TOKEN\"}" | jq -r '.key')

          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate